name: Sync agent skill to apollographql/skills
on:
  push:
    branches: [main]
    paths:
      - "docs/agent-skills/apollo-client/**"
  workflow_dispatch: # for testing
permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: github-actions-bot-app-token
        with:
          app-id: 819772
          private-key: ${{ secrets.APOLLO_GITHUB_ACTIONS_BOT_PRIVATE_KEY }}
          repositories: skills
      - uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 # v1
        with:
          workflow: sync-apollo-client-skill.yml
          repo: apollographql/skills
          token: ${{ steps.github-actions-bot-app-token.outputs.token }}
          inputs: '{"source_sha": "${{ github.sha }}"}'
